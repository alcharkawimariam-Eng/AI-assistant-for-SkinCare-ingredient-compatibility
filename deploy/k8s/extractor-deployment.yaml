apiVersion: apps/v1
kind: Deployment
metadata:
  name: extractor
  namespace: skincare-ai
  labels:
    app: extractor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: extractor
  template:
    metadata:
      labels:
        app: extractor
    spec:
      containers:
        - name: extractor
          image: <DOCKERHUB_USER>/skincare-extractor:latest
          ports:
            - containerPort: 8001
          env:
            # Optional: set OPENAI_API_KEY via a Kubernetes Secret
            # - name: OPENAI_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: skincare-ai-secrets
            #       key: OPENAI_API_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: extractor
  namespace: skincare-ai
spec:
  selector:
    app: extractor
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
