# Secret template — DO NOT commit real values to git.
# Create this secret manually on the cluster:
#
#   kubectl create secret generic skincare-ai-secrets \
#     --namespace skincare-ai \
#     --from-literal=OPENAI_API_KEY="sk-..."
#
# Then reference it in extractor-deployment.yaml under env:
#   - name: OPENAI_API_KEY
#     valueFrom:
#       secretKeyRef:
#         name: skincare-ai-secrets
#         key: OPENAI_API_KEY

apiVersion: v1
kind: Secret
metadata:
  name: skincare-ai-secrets
  namespace: skincare-ai
type: Opaque
stringData:
  OPENAI_API_KEY: "<REPLACE_AT_DEPLOY_TIME_DO_NOT_COMMIT>"
