apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: skincare-ai
  labels:
    app: risk-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
    spec:
      containers:
        - name: risk-engine
          image: <DOCKERHUB_USER>/skincare-risk-engine:latest
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: risk-engine
  namespace: skincare-ai
spec:
  selector:
    app: risk-engine
  ports:
    - name: http
      port: 8002
      targetPort: 8002
  type: ClusterIP
