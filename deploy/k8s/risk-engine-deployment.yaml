apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: skincare-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
    spec:
      containers:
        - name: risk-engine
          image: your-dockerhub-user/risk-engine:latest
          ports:
            - containerPort: 8002
