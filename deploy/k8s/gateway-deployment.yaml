apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: skincare-ai
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: <DOCKERHUB_USER>/skincare-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: EXTRACTOR_URL
              valueFrom:
                configMapKeyRef:
                  name: skincare-ai-config
                  key: EXTRACTOR_URL
            - name: EXTRACTOR_OCR_URL
              valueFrom:
                configMapKeyRef:
                  name: skincare-ai-config
                  key: EXTRACTOR_OCR_URL
            - name: ANALYZER_URL
              valueFrom:
                configMapKeyRef:
                  name: skincare-ai-config
                  key: ANALYZER_URL
            - name: PERSONALIZER_URL
              valueFrom:
                configMapKeyRef:
                  name: skincare-ai-config
                  key: PERSONALIZER_URL
            - name: ROUTINE_BUILDER_URL
              valueFrom:
                configMapKeyRef:
                  name: skincare-ai-config
                  key: ROUTINE_BUILDER_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: skincare-ai
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
